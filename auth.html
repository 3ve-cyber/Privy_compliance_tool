<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privy – Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; font-size: 48px; }
        .title { text-align: center; font-size: 24px; font-weight: 700; color: #0f172a; }
        .subtitle { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 28px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 4px; color: #334155; }
        .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
            background: #fff;
        }
        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn:hover { background: #5a67d8; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.3); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error {
            background: #fed7d7; color: #9b2c2c; padding: 10px 14px; border-radius: 8px;
            margin-bottom: 16px; font-size: 14px; display: none;
        }
        .success {
            background: #c6f6d5; color: #22543d; padding: 10px 14px; border-radius: 8px;
            margin-bottom: 16px; font-size: 14px; display: none;
        }
        .switch-link { text-align: center; margin-top: 16px; font-size: 14px; color: #64748b; }
        .switch-link a { color: #667eea; cursor: pointer; font-weight: 600; }
        .switch-link a:hover { text-decoration: underline; }
        .spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top-color: #fff; animation: spin 0.8s ease infinite; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .password-wrapper { position: relative; }
        .password-wrapper .form-control { padding-right: 40px; }
        .toggle-password {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #94a3b8; background: none; border: none; font-size: 16px;
        }
        .footer-note {
            margin-top: 16px;
            padding: 12px;
            background: #f8fafc;
            border-radius: 8px;
            font-size: 12px;
            color: #94a3b8;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .footer-note strong { color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔒</div>
        <div class="title">Privy</div>
        <div class="subtitle">Compliance Management Platform</div>

        <div id="errorMsg" class="error"></div>
        <div id="successMsg" class="success"></div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input class="form-control" id="loginUsername" placeholder="Enter your username" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input class="form-control" id="loginPassword" type="password" placeholder="Enter your password" />
                    <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">👁️</button>
                </div>
            </div>
            <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
            <div class="switch-link">
                Don't have an account? <a onclick="showRegister()">Create one</a>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" style="display:none;">
            <div class="form-group">
                <label>Username</label>
                <input class="form-control" id="registerUsername" placeholder="Choose a username" />
            </div>
            <div class="form-group">
                <label>Email</label>
                <input class="form-control" id="registerEmail" type="email" placeholder="your@email.com" />
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input class="form-control" id="registerFullname" placeholder="Your full name" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input class="form-control" id="registerPassword" type="password" placeholder="Choose a strong password" />
                    <button type="button" class="toggle-password" onclick="togglePassword('registerPassword', this)">👁️</button>
                </div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="password-wrapper">
                    <input class="form-control" id="registerConfirm" type="password" placeholder="Confirm your password" />
                    <button type="button" class="toggle-password" onclick="togglePassword('registerConfirm', this)">👁️</button>
                </div>
            </div>
            <button class="btn" onclick="handleRegister()">Create Account</button>
            <div class="switch-link">
                Already have an account? <a onclick="showLogin()">Sign in</a>
            </div>
        </div>

        <!-- Footer Note (No passwords shown) -->
        <div class="footer-note">
            <strong>🔒 Secure Login</strong> — Contact your administrator for access
        </div>
    </div>

    <script>
        const AUTH_API = 'http://localhost:8001/api/auth';
        const MAIN_APP = 'frontend.html';

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
            else { input.type = 'password'; btn.textContent = '👁️'; }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg; el.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg; el.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('loginForm').style.display !== 'none') handleLogin();
                else handleRegister();
            }
        });

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const btn = document.getElementById('loginBtn');

            if (!username || !password) { showError('Please enter username and password'); return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Signing in...';

            try {
                const res = await fetch(`${AUTH_API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('privy_token', data.access_token);
                    localStorage.setItem('privy_user', JSON.stringify(data.user));
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => { window.location.href = MAIN_APP; }, 1000);
                } else {
                    showError(data.detail || 'Invalid credentials');
                }
            } catch (error) {
                showError('❌ Cannot connect to auth server. Make sure it\'s running on port 8001');
            }

            btn.disabled = false;
            btn.innerHTML = 'Sign In';
        }

        async function handleRegister() {
            const username = document.getElementById('registerUsername').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const fullname = document.getElementById('registerFullname').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;

            if (!username || !email || !password) { showError('Please fill in all required fields'); return; }
            if (password !== confirm) { showError('Passwords do not match'); return; }
            if (password.length < 6) { showError('Password must be at least 6 characters'); return; }

            try {
                const res = await fetch(`${AUTH_API}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, full_name: fullname })
                });
                const data = await res.json();

                if (res.ok) {
                    showSuccess('Account created! You can now login.');
                    setTimeout(() => { showLogin(); document.getElementById('loginUsername').value = username; }, 1500);
                } else {
                    showError(data.detail || 'Registration failed');
                }
            } catch (error) {
                showError('❌ Cannot connect to auth server. Make sure it\'s running on port 8001');
            }
        }

        // Check if already logged in
        if (localStorage.getItem('privy_token')) {
            window.location.href = MAIN_APP;
        }
    </script>
</body>
</html>
